<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan CCCD PRO</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f5f5f5;
}

#reader {
  width: 320px;
  margin: auto;
}

.card {
  background: white;
  padding: 15px;
  margin: 15px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

button {
  padding: 10px 20px;
  border: none;
  background: #007bff;
  color: white;
  border-radius: 5px;
}
</style>
</head>

<body>

<h2>📱 Scan CCCD</h2>

<div id="reader"></div>

<div class="card" id="result">
  Chưa có dữ liệu
</div>

<button onclick="startScan()">Start</button>
<button onclick="stopScan()">Stop</button>

<script>
const apiUrl = "https://script.google.com/macros/s/AKfycbyGJobNGTStsi8wEgz-GbIvzi_zLtO42QirzkFmUiKzfNlCOfGUnsho05xzJJyCaEG8/exec";
let scanner;

function parseCCCD(text) {
  const parts = text.split("|");

  return {
    id: parts[0],
    name: parts[2],
    dob: parts[3],
    gender: parts[4],
    address: parts[5]
  };
}

function showData(data) {
  document.getElementById("result").innerHTML = `
    <b>${data.name}</b><br>
    CCCD: ${data.id}<br>
    Ngày sinh: ${data.dob}<br>
    Giới tính: ${data.gender}<br>
    Địa chỉ: ${data.address}
  `;
}

function sendToSheet(data) {
  fetch(apiUrl, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    if (res.status === "duplicate") {
      alert("⚠️ CCCD đã tồn tại!");
    } else {
      alert("✅ Đã lưu!");
    }
  });
}

function onScanSuccess(decodedText) {
  const data = parseCCCD(decodedText);

  showData(data);
  sendToSheet(data);
}

function startScan() {
  scanner = new Html5Qrcode("reader");
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess
  );
}

function stopScan() {
  if (scanner) {
    scanner.stop();
  }
}
</script>

</body>
</html>
<!-- trigger build -->
