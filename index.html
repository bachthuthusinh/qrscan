<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan CCCD PRO</title>

<!-- QUAN TRỌNG: giúp hiển thị đúng trên mobile -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

/* camera full màn hình */
#reader {
  width: 100vw;
  height: 60vh;
}

/* box hiển thị info */
.card {
  background: white;
  color: black;
  padding: 15px;
  margin: 10px;
  border-radius: 12px;
  font-size: 16px;
}

/* nút */
button {
  padding: 12px 20px;
  margin: 5px;
  border: none;
  background: #007bff;
  color: white;
  border-radius: 8px;
  font-size: 16px;
}

/* trạng thái */
.status {
  margin-top: 5px;
  font-size: 14px;
}
</style>
</head>

<body>

<h2>📱 Scan CCCD</h2>

<div id="reader"></div>

<div class="card" id="result">
  Chưa có dữ liệu
</div>

<div class="status" id="status"></div>

<button onclick="startScan()">▶ Start</button>
<button onclick="stopScan()">⏹ Stop</button>

<script>
/* 🔥 DÁN LINK GOOGLE APPS SCRIPT VÀO ĐÂY */
const apiUrl = "https://script.google.com/macros/s/AKfycbyGJobNGTStsi8wEgz-GbIvzi_zLtO42QirzkFmUiKzfNlCOfGUnsho05xzJJyCaEG8/exec";

let scanner;
let scanned = false;

/* parse dữ liệu CCCD */
function parseCCCD(text) {
  const parts = text.split("|");

  return {
    id: parts[0] || "",
    name: parts[2] || "",
    dob: parts[3] || "",
    gender: parts[4] || "",
    address: parts[5] || ""
  };
}

/* hiển thị thông tin */
function showData(data) {
  document.getElementById("result").innerHTML = `
    <b>${data.name}</b><br>
    CCCD: ${data.id}<br>
    Ngày sinh: ${data.dob}<br>
    Giới tính: ${data.gender}<br>
    Địa chỉ: ${data.address}
  `;
}

/* hiển thị trạng thái */
function setStatus(msg, color="white") {
  const el = document.getElementById("status");
  el.innerText = msg;
  el.style.color = color;
}

/* gửi dữ liệu lên Google Sheet */
function sendToSheet(data) {
  setStatus("⏳ Đang gửi dữ liệu...", "yellow");

  fetch(apiUrl, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    if (res.status === "duplicate") {
      setStatus("⚠️ CCCD đã tồn tại", "orange");
      navigator.vibrate(200);
    } else {
      setStatus("✅ Đã lưu thành công", "lightgreen");
      navigator.vibrate([100, 50, 100]);
    }
  })
  .catch(() => {
    setStatus("❌ Lỗi gửi dữ liệu", "red");
  });
}

/* khi scan thành công */
function onScanSuccess(decodedText) {
  if (scanned) return;

  scanned = true;

  const data = parseCCCD(decodedText);

  showData(data);
  sendToSheet(data);

  // cho scan lại sau 3 giây
  setTimeout(() => scanned = false, 3000);
}

/* bắt đầu scan */
function startScan() {
  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    {
      fps: 10,
      qrbox: { width: 280, height: 280 }
    },
    onScanSuccess
  );

  setStatus("📷 Đang quét...", "cyan");
}

/* dừng scan */
function stopScan() {
  if (scanner) {
    scanner.stop();
    setStatus("⏹ Đã dừng", "gray");
  }
}

/* auto chạy khi mở web */
window.onload = () => {
  startScan();
};
</script>

</body>
</html>
