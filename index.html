<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan CCCD PRO</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
}

#reader {
  width: 100vw;
  height: 65vh;
}

.card {
  background: white;
  color: black;
  padding: 15px;
  margin: 10px;
  border-radius: 12px;
  font-size: 15px;
  text-align: left;
}

.status {
  font-size: 14px;
  margin: 5px;
}

button {
  padding: 12px 18px;
  margin: 5px;
  border: none;
  background: #007bff;
  color: white;
  border-radius: 8px;
  font-size: 15px;
}
</style>
</head>

<body>

<h3>📱 Scan CCCD</h3>

<div id="reader"></div>

<div class="card" id="result">
  Chưa có dữ liệu
</div>

<div class="status" id="status"></div>

<button onclick="startScan()">▶ Start</button>
<button onclick="stopScan()">⏹ Stop</button>

<script>
/* 🔥 THAY LINK API Ở ĐÂY */
const apiUrl = "https://script.google.com/macros/s/AKfycbyGJobNGTStsi8wEgz-GbIvzi_zLtO42QirzkFmUiKzfNlCOfGUnsho05xzJJyCaEG8/exec";

let scanner;
let scanned = false;

/* parse CCCD */
function parseCCCD(text) {
  console.log("RAW:", text);

  const parts = text.split("|");

  return {
    id: parts[0] || "",
    name: parts[2] || "",
    dob: parts[3] || "",
    gender: parts[4] || "",
    address: parts[5] || ""
  };
}

/* hiển thị dữ liệu */
function showData(data) {
  document.getElementById("result").innerHTML = `
    <b>${data.name}</b><br>
    CCCD: ${data.id}<br>
    Ngày sinh: ${data.dob}<br>
    Giới tính: ${data.gender}<br>
    Địa chỉ: ${data.address}
  `;
}

/* status */
function setStatus(msg, color="white") {
  const el = document.getElementById("status");
  el.innerText = msg;
  el.style.color = color;
}

/* gửi Google Sheet */
function sendToSheet(data) {
  setStatus("⏳ Đang gửi...", "yellow");

  fetch(apiUrl, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    if (res.status === "duplicate") {
      setStatus("⚠️ Đã tồn tại", "orange");
      navigator.vibrate(200);
    } else {
      setStatus("✅ Đã lưu", "lightgreen");
      navigator.vibrate([100,50,100]);
    }
  })
  .catch(err => {
    console.log(err);
    setStatus("❌ Lỗi gửi", "red");
  });
}

/* scan thành công */
function onScanSuccess(decodedText) {
  if (scanned) return;

  scanned = true;

  setStatus("📥 Đã nhận QR", "cyan");

  const data = parseCCCD(decodedText);

  showData(data);
  sendToSheet(data);

  setTimeout(() => scanned = false, 3000);
}

/* scan lỗi (debug) */
function onScanError(error) {
  // log nhẹ thôi, tránh spam
}

/* start scan */
function startScan() {
  scanner = new Html5Qrcode("reader");

  scanner.start(
    {
      facingMode: "environment"
    },
    {
      fps: 15,
      qrbox: { width: 260, height: 260 },
      aspectRatio: 1.0
    },
    onScanSuccess,
    onScanError
  ).then(() => {
    setStatus("📷 Đang quét...", "cyan");
  }).catch(err => {
    console.log(err);
    setStatus("❌ Không mở được camera", "red");
  });
}

/* stop */
function stopScan() {
  if (scanner) {
    scanner.stop();
    setStatus("⏹ Đã dừng", "gray");
  }
}

/* auto chạy */
window.onload = () => {
  startScan();
};
</script>

</body>
</html>
